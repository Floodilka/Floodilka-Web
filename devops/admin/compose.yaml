services:
  admin:
    image: floodilka-admin:latest
    hostname: admin
    env_file:
      - /var/www/floodilka/.env
    networks:
      - floodilka-shared
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      labels:
        caddy: stage.floodilka.com
        caddy.handle_path: /admin*
        caddy.handle_path.reverse_proxy: '{{upstreams 8080}}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:8080/admin/_health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  floodilka-shared:
    external: true
