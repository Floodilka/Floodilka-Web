# Конфигурация Nginx для Floodilka только с .com доменом
# Временная версия для миграции только на floodilka.com
# Сохранить в: /etc/nginx/sites-available/floodilka
# Создать симлинк: ln -s /etc/nginx/sites-available/floodilka /etc/nginx/sites-enabled/
# Проверить: nginx -t
# Перезапустить: systemctl restart nginx

# Перенаправление HTTP -> HTTPS для .com
server {
    listen 80;
    listen [::]:80;
    server_name floodilka.com www.floodilka.com;

    return 301 https://floodilka.com$request_uri;
}

# Перенаправление www -> без www для .com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.floodilka.com;

    ssl_certificate /etc/letsencrypt/live/floodilka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/floodilka.com/privkey.pem;

    return 301 https://floodilka.com$request_uri;
}

# HTTPS сервер для floodilka.com (основной)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name floodilka.com;

    # SSL сертификаты (после настройки Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/floodilka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/floodilka.com/privkey.pem;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Логи
    access_log /var/log/nginx/floodilka-access.log;
    error_log /var/log/nginx/floodilka-error.log;

    # Frontend (статические файлы)
    location / {
        root /var/www/boltushka/public;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Кэширование статики
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Загруженные файлы (аватары)
    location /uploads/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Настройки для WebSocket
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Размер загружаемых файлов
    client_max_body_size 50M;
}

