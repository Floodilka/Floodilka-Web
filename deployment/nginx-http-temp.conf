# Временная HTTP конфигурация для получения SSL сертификатов
# Используется только во время миграции

# HTTP сервер для floodilka.com
server {
    listen 80;
    listen [::]:80;
    server_name floodilka.com www.floodilka.com;

    # Логи
    access_log /var/log/nginx/floodilka-temp-access.log;
    error_log /var/log/nginx/floodilka-temp-error.log;

    # Frontend (статические файлы)
    location / {
        root /var/www/floodilka/public;
        try_files $uri $uri/ /index.html;
    }

    # Для certbot
    location /.well-known/acme-challenge/ {
        root /var/www/floodilka/public;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

