# Конфигурация Nginx для floodilka БЕЗ домена (только HTTP)
# ВНИМАНИЕ: WebRTC может не работать без HTTPS!
# Сохранить в: /etc/nginx/sites-available/floodilka
# Создать симлинк: ln -s /etc/nginx/sites-available/floodilka /etc/nginx/sites-enabled/
# Проверить: nginx -t
# Перезапустить: systemctl restart nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # ЗАМЕНИТЕ НА ВАШ IP АДРЕС ИЛИ ДОМЕН:
    # server_name YOUR_NEW_SERVER_IP;
    # Или если есть домен:
    # server_name your-new-domain.ru;

    # Если без домена - используется IP (ЗАМЕНИТЕ НА ВАШ IP!)
    server_name _;

    # Логи
    access_log /var/log/nginx/floodilka-access.log;
    error_log /var/log/nginx/floodilka-error.log;

    # Frontend (статические файлы)
    location / {
        root /var/www/floodilka/public;
        try_files $uri $uri/ /index.html;

        # Кэширование статики
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Загруженные файлы (аватары)
    location /uploads/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Настройки для WebSocket
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Размер загружаемых файлов
    client_max_body_size 50M;
}

