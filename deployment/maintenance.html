<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техническое обслуживание - Floodilka</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 15px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            font-size: 1.1em;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info p {
            font-size: 0.95em;
            opacity: 0.7;
        }

        .retry-button {
            margin-top: 30px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            .icon {
                font-size: 60px;
            }
        }

        /* Auto-retry counter */
        .countdown {
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Техническое обслуживание</h1>
        <p>Мы обновляем Floodilka для улучшения сервиса</p>
        <p>Это займет всего несколько секунд</p>

        <div class="status">
            <div class="spinner"></div>
            <span>Обновление в процессе...</span>
        </div>

        <button class="retry-button" onclick="location.reload()">
            Проверить доступность
        </button>

        <div class="info">
            <p>Автоматическая проверка через: <span class="countdown" id="countdown">10</span> сек</p>
            <p>Обычно обновление занимает менее 30 секунд</p>
        </div>
    </div>

    <script>
        // Auto-reload через 10 секунд
        let countdown = 10;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(timer);
                location.reload();
            }
        }, 1000);

        // Также пробуем каждые 3 секунды проверить доступность API
        const checkAvailability = setInterval(() => {
            fetch('/api/health', { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        clearInterval(checkAvailability);
                        clearInterval(timer);
                        location.reload();
                    }
                })
                .catch(() => {
                    // Backend еще не готов, продолжаем ждать
                });
        }, 3000);
    </script>
</body>
</html>
