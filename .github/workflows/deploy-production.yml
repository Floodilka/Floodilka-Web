name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend
          - desktop-all
          - desktop-win
          - desktop-mac

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/floodilka

jobs:
  build-frontend:
    name: Build Frontend
    if: inputs.target == 'all' || inputs.target == 'frontend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/crates/libfluxcore

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: frontend/scripts/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          PUBLIC_PROJECT_ENV: stable
          PUBLIC_BUILD_SHA: ${{ github.sha }}
          PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          export PUBLIC_BUILD_TIMESTAMP=$(date +%s)
          pnpm wasm:codegen
          pnpm generate:colors
          pnpm generate:masks
          pnpm generate:css-types
          npx tsc --noEmit
          npx lingui compile
          rm -rf dist
          npx rspack build --mode production
          npx tsx scripts/build-sw.mjs
          echo "{\"sha\":\"$PUBLIC_BUILD_SHA\",\"buildNumber\":$PUBLIC_BUILD_NUMBER,\"buildTimestamp\":\"$PUBLIC_BUILD_TIMESTAMP\"}" > dist/version.json

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  build-images:
    name: Build ${{ matrix.service }}
    if: inputs.target == 'all' || inputs.target == 'backend'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: floodilka-backend
          - service: gateway
            context: gateway
            dockerfile: gateway/Dockerfile
            image: floodilka-gateway
          - service: media-proxy
            context: media-proxy
            dockerfile: media-proxy/Dockerfile
            image: floodilka-media-proxy
          - service: admin
            context: admin
            dockerfile: admin/Dockerfile
            image: floodilka-admin
          - service: metrics
            context: metrics
            dockerfile: metrics/Dockerfile
            image: floodilka-metrics
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build timestamp
        id: meta
        run: echo "timestamp=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.service == 'admin' && format('BUILD_TIMESTAMP={0}', steps.meta.outputs.timestamp) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy-production:
    name: Deploy to Production
    needs: [build-frontend, build-images]
    if: always() && !failure() && !cancelled() && !startsWith(inputs.target, 'desktop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        if: inputs.target == 'all' || inputs.target == 'frontend'
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host production
            HostName ${{ secrets.PRODUCTION_HOST }}
            User ${{ secrets.PRODUCTION_USER }}
            IdentityFile ~/.ssh/deploy_key
            ControlMaster auto
            ControlPath /tmp/ssh-deploy-%C
            ControlPersist 5m
          EOF

      - name: Sync frontend dist
        if: inputs.target == 'all' || inputs.target == 'frontend'
        run: rsync -az --delete --exclude='desktop/' frontend-dist/ production:/srv/frontend/

      - name: Sync devops configs
        run: rsync -az devops/ production:/var/www/floodilka/devops/

      - name: Deploy frontend stack
        if: inputs.target == 'all' || inputs.target == 'frontend'
        run: ssh production "docker stack deploy -c /var/www/floodilka/devops/frontend/compose.yaml frontend"

      - name: Pull images and deploy backend
        if: inputs.target == 'all' || inputs.target == 'backend'
        env:
          SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | ssh production "docker login ghcr.io -u github-actions --password-stdin"

          for image in floodilka-backend floodilka-gateway floodilka-media-proxy floodilka-admin floodilka-metrics; do
            ssh production "docker pull ghcr.io/floodilka/${image}:${SHA} && docker tag ghcr.io/floodilka/${image}:${SHA} ${image}:latest"
          done

          ssh production "
            docker stack deploy -c /var/www/floodilka/devops/backend/compose.yaml backend &&
            docker stack deploy -c /var/www/floodilka/devops/gateway/compose.yaml gateway &&
            docker stack deploy -c /var/www/floodilka/devops/media-proxy/compose.yaml media &&
            docker stack deploy -c /var/www/floodilka/devops/admin/compose.yaml admin &&
            docker stack deploy -c /var/www/floodilka/devops/metrics/compose.yaml metrics
          "

          ssh production "
            docker service update --force backend_api &&
            docker service update --force backend_worker &&
            docker service update --force gateway_gateway &&
            docker service update --force media_media &&
            docker service update --force admin_admin &&
            docker service update --force metrics_metrics
          "

      - name: Health checks
        run: |
          echo "Waiting for services to stabilize..."
          sleep 10

          if [[ "${{ inputs.target }}" == "all" || "${{ inputs.target }}" == "backend" ]]; then
            echo "Checking API health..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://floodilka.com/api/_health

            echo "Checking Media Proxy health..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://floodilka.com/media/_health

            echo "Checking Gateway health..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://gateway.floodilka.com/_health
          fi

          if [[ "${{ inputs.target }}" == "all" || "${{ inputs.target }}" == "frontend" ]]; then
            echo "Checking Frontend..."
            curl -sf --retry 5 --retry-delay 10 --retry-all-errors https://floodilka.com/
          fi

          echo ""
          echo "All health checks passed!"

      - name: Cleanup old images
        if: always()
        run: ssh production "docker container prune -f && docker image prune -af" || true

  # ─── Desktop builds ───────────────────────────────────────────────

  build-desktop-mac:
    name: Build Desktop (macOS)
    if: inputs.target == 'desktop-all' || inputs.target == 'desktop-mac'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-mac-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-mac-

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          rm $CERT_PATH

      - name: Build desktop (macOS)
        working-directory: frontend
        env:
          BUILD_CHANNEL: stable
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm electron:compile
          pnpm exec electron-builder --config electron-builder.config.cjs --mac

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: |
            frontend/dist-electron/floodilka-stable-*-arm64.dmg
            frontend/dist-electron/floodilka-stable-*-x64.dmg
            frontend/dist-electron/floodilka-stable-*-arm64.zip
            frontend/dist-electron/floodilka-stable-*-x64.zip
          retention-days: 7

  build-desktop-win:
    name: Build Desktop (Windows)
    if: inputs.target == 'desktop-all' || inputs.target == 'desktop-win'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-win-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-win-

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build desktop (Windows)
        working-directory: frontend
        env:
          BUILD_CHANNEL: stable
        run: |
          pnpm electron:compile
          pnpm exec electron-builder --config electron-builder.config.cjs --win --x64

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: frontend/dist-electron/squirrel-windows/
          retention-days: 7

  deploy-desktop:
    name: Deploy Desktop
    needs: [build-desktop-mac, build-desktop-win]
    if: always() && !failure() && !cancelled() && (needs.build-desktop-mac.result == 'success' || needs.build-desktop-win.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./frontend/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host production
            HostName ${{ secrets.PRODUCTION_HOST }}
            User ${{ secrets.PRODUCTION_USER }}
            IdentityFile ~/.ssh/deploy_key
          EOF

      - name: Download macOS artifacts
        if: needs.build-desktop-mac.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: desktop-mac
          path: artifacts/mac/

      - name: Download Windows artifacts
        if: needs.build-desktop-win.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: desktop-win
          path: artifacts/win/

      - name: Deploy macOS
        if: needs.build-desktop-mac.result == 'success'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          REMOTE_BASE="/srv/frontend/desktop/updates"
          CHANNEL="stable"
          DOMAIN="floodilka.com"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://${DOMAIN}/desktop/updates/${CHANNEL}/darwin"

          ssh production "mkdir -p ${REMOTE_BASE}/${CHANNEL}/darwin/arm64 ${REMOTE_BASE}/${CHANNEL}/darwin/x64"
          ssh production "find ${REMOTE_BASE}/${CHANNEL}/darwin/arm64 -name '*.zip' -delete; find ${REMOTE_BASE}/${CHANNEL}/darwin/x64 -name '*.zip' -delete" || true

          scp artifacts/mac/floodilka-stable-${VERSION}-arm64.dmg production:${REMOTE_BASE}/latest-arm64-mac.dmg
          scp artifacts/mac/floodilka-stable-${VERSION}-x64.dmg production:${REMOTE_BASE}/latest-mac.dmg
          scp artifacts/mac/floodilka-stable-${VERSION}-arm64.zip production:${REMOTE_BASE}/${CHANNEL}/darwin/arm64/
          scp artifacts/mac/floodilka-stable-${VERSION}-x64.zip production:${REMOTE_BASE}/${CHANNEL}/darwin/x64/

          echo "{\"url\":\"${BASE_URL}/arm64/floodilka-stable-${VERSION}-arm64.zip\",\"name\":\"${VERSION}\",\"notes\":\"\",\"pub_date\":\"${PUB_DATE}\"}" | ssh production "cat > ${REMOTE_BASE}/${CHANNEL}/darwin/arm64/RELEASES.json"
          echo "{\"url\":\"${BASE_URL}/x64/floodilka-stable-${VERSION}-x64.zip\",\"name\":\"${VERSION}\",\"notes\":\"\",\"pub_date\":\"${PUB_DATE}\"}" | ssh production "cat > ${REMOTE_BASE}/${CHANNEL}/darwin/x64/RELEASES.json"

          echo "macOS deployed: v${VERSION}"

      - name: Deploy Windows
        if: needs.build-desktop-win.result == 'success'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          REMOTE_BASE="/srv/frontend/desktop/updates"
          CHANNEL="stable"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ssh production "mkdir -p ${REMOTE_BASE}/${CHANNEL}/win32/x64"
          ssh production "find ${REMOTE_BASE}/${CHANNEL}/win32/x64 -type f -delete" || true

          # Upload Setup.exe as landing download
          scp artifacts/win/floodilka-stable-${VERSION}-x64.exe production:${REMOTE_BASE}/Floodilka.exe

          # Upload all Squirrel files (Setup.exe, .nupkg, RELEASES)
          for f in artifacts/win/*; do
            [ -f "$f" ] && scp "$f" production:${REMOTE_BASE}/${CHANNEL}/win32/x64/
          done

          # RELEASES.json for manual version check
          echo "{\"url\":\"\",\"name\":\"${VERSION}\",\"notes\":\"\",\"pub_date\":\"${PUB_DATE}\"}" | ssh production "cat > ${REMOTE_BASE}/${CHANNEL}/win32/x64/RELEASES.json"

          echo "Windows deployed: v${VERSION}"
